name: Deploy Lexicons to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'lexicons/**'
      - 'docs/**'
      - '.github/workflows/deploy-lexicons.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Copy lexicons to docs
        run: |
          mkdir -p docs/com/crown-shy/testing
          cp lexicons/*.json docs/com/crown-shy/testing/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
